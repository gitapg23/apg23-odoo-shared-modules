
name: Sync Branch

on:
  push:
    branches:
      - main   # branch di partenza

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into staging_apg23_2
        env:
          TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git fetch origin
          git checkout staging_apg23_2
          git merge origin/main --no-ff --allow-unrelated-histories -X theirs -m "Sync main into staging_apg23_2"
          git push origin staging_apg23_2
