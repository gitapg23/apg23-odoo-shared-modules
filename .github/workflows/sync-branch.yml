name: Sync Branch to External Repo

on:
  push:
    branches:
      - main   # branch di partenza

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository sorgente (main)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          fetch-depth: 0

      - name: List files in addons on main
        run: |
          echo "Current commit on main:"
          git rev-parse HEAD
          echo "Listing addons folder:"
          ls -R addons/

      # 2️⃣ Configura git
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 3️⃣ Aggiungi remote per repository di destinazione
      - name: Add remote for target repository
        run: |
          git remote add target https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/airsrl/apg23.git
          git fetch target

      # 4️⃣ Checkout del branch target
      - name: Checkout target branch
        run: |
          git checkout -B staging_apg23_2 target/staging_apg23_2 || git checkout -B staging_apg23_2

      # 5️⃣ Prendi i file da main
      # 5️⃣ Checkout addons content from main
      - name: Checkout addons from main
        run: |
          git fetch origin main
          git checkout origin/main -- addons/
      
      # 6️⃣ Copia tutto il contenuto di addons/ nella root
      - name: Copy addons content to root
        run: |
          # copia tutto il contenuto di addons/ nella root, ignorando la cartella addons stessa
          shopt -s dotglob  # include file nascosti
          cp -r addons/* ./  
      
      # 7️⃣ Debug: lista file fisici nella root
      - name: List files in root after copy
        run: |
          echo "Files in root:"
          find . -maxdepth 1 -type f
          echo "Folders in root:"
          find . -maxdepth 1 -type d
      
      # 8️⃣ Git status
      - name: Git status
        run: git status
      
      # 9️⃣ Commit e push
      - name: Commit and push
        run: |
          git add .
          git commit -m "Sync addons content from main" || echo "No changes to commit"
          git push target staging_apg23_2
