name: Sync Branch to External Repo

on:
  push:
    branches:
      - main   # branch di partenza

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository sorgente
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          fetch-depth: 0 

      - name: List files in addons
        run: |
          echo "Current commit:"
          git rev-parse HEAD
          echo "Listing addons folder:"
          ls -R addons/

      # 2️⃣ Configura git
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 3️⃣ Aggiungi remote per repository di destinazione
      - name: Add remote for target repository
        run: |
          git remote add target https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/airsrl/apg23.git
          git fetch target

      # 4️⃣ Checkout del branch target locale
      - name: Checkout target branch
        run: |
          git checkout -B staging_apg23_2 target/staging_apg23_2 || git checkout -B staging_apg23_2

      - name: Debug target branch
        run: |
          echo "Current commit in staging_apg23_2:"
          git rev-parse HEAD
          echo "Listing all files:"
          git ls-tree -r HEAD --name-only

      - name: List files in working directory
        run: |
          echo "Listing files in root:"
          ls -R
      
        #copia solo i file comuni di addons/ in apg23/
      - name: Copy addons content to root
        run: |
          # Aggiorna i file/
          rsync -av  addons/ ./
          
      - name: List nuovi file in root
        run: |
          echo "Listing new  files in root:"
          ls -R
      - name: Check working directory
        run: pwd
      

      # 6️⃣ Commit e push solo se ci sono modifiche
      - name: Commit and push
        run: |
          git add .
          git commit -m "Sync addons content from main" || echo "No changes to commit"
          git push target staging_apg23_2
